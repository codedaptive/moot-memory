# Release — verify a lockstep version tag and cut the GitHub Release.
#
# Trigger: tag `vX.Y.Z` pushed by mootx01-ee's sdk-publish workflow (or by
# scripts/lib_publish/publish-libraries.py run locally with --push).
# SwiftPM consumers resolve directly from the tag.
#
# Two-job trust boundary (hardening, 2026-07-02 security review):
# - `verify` runs with contents:read and persist-credentials:false, so the
#   Cargo build step (which can execute build scripts from the tagged tree)
#   never sees a write-capable credential.
# - `verify` also requires the tagged commit to be reachable from main. The
#   publisher pushes branch + tag together, so a legitimate tag always is;
#   a tag pushed on an unreviewed commit fails here before anything builds.
# - `release` has contents:write but executes no code from the checkout —
#   it only reads SOURCE.md for the notes and calls `gh release create`.

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check tag commit is on main
        run: git merge-base --is-ancestor HEAD origin/main

      - name: Check generated provenance
        run: |
          test -f SOURCE.md
          test -f LICENSE
          test -f NOTICE
          grep -q "Generated by scripts/lib_publish/bootstrap-public-venues.py" SOURCE.md
          grep -q "Version: \`${GITHUB_REF_NAME#v}\`" SOURCE.md

      - name: Check Cargo workspace build
        run: |
          cargo metadata --locked --manifest-path Cargo.toml --no-deps --format-version 1 > /dev/null
          cargo check --workspace --locked

  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes="$(sed -n '/^# Source/,$p' SOURCE.md)"
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes "$notes"
