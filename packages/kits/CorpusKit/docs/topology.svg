    .sub   { font-size: 10.5px; fill: #555; }
    .flow  { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    .read  { stroke: #888; stroke-width: 1.3; fill: none; marker-end: url(#arrow); stroke-dasharray: 5 3; }
    .region { fill: none; stroke: #999; stroke-width: 1.2; stroke-dasharray: 7 4; }
    .regionlabel { font-size: 11px; fill: #777; font-style: italic; }
  </style>

  <!-- Title -->
  <text x="20" y="28" font-size="15" font-weight="bold" fill="#111">CorpusKit: text in, scored chunks out</text>

