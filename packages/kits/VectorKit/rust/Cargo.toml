[package]
name = "vectorkit"
version = "0.2.0"
edition = "2021"
rust-version = "1.75"
description = "On-device embedding generation and persistence-kit-backed vector storage. EmbeddingProvider trait, FloatSimHash projection, model-tagged vector records per spec I-4."
license = "MIT OR Apache-2.0"
publish = false

[lib]
name = "vectorkit"
path = "src/lib.rs"

# Storage now flows through persistence-kit (any backend), not direct
# rusqlite. EngramLib and SubstrateLib are still consumed for the
# Engram type and the FloatSimHash projection. Rusqlite is gone.
#
# intellectus-lib: zero-dep telemetry floor. VectorStore emits search and
# insert metrics via the report! macro, which is a no-op when monitoring is
# disabled (the default). Off-path cost: one AtomicBool load + branch.
# Authority: DECISION_LIFT_PACKAGE_SWIFT_RULE_2026-05-28 + MANAGER_1.0_PLAN §4.
[dependencies]
substrate-ml = { package = "substrate-ml", git = "https://github.com/codedaptive/moot-core", tag = "v1.0.32" }
substrate-types = { package = "substrate-types", git = "https://github.com/codedaptive/moot-core", tag = "v1.0.32" }
engram-lib = { package = "engram-lib", git = "https://github.com/codedaptive/moot-core", tag = "v1.0.32" }
persistence-kit = { package = "persistence-kit", git = "https://github.com/codedaptive/moot-system", tag = "v1.0.32" }
uuid = { version = "1", features = ["v4"] }
intellectus-lib = { package = "intellectus-lib", git = "https://github.com/codedaptive/moot-core", tag = "v1.0.32" }

# tempfile is used in ResidentArrayStore tests to create temporary .vec
# persistence tests (write → mmap-reopen → identical top-k) on a real
# on-disk file (NOT InMemory)." Real filesystem I/O exercised in tests.
[dev-dependencies]
tempfile = "3"
