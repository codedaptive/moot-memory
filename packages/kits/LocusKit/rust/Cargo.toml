[package]
name = "locus-kit"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
description = "LocusKit — spatial memory for one estate. Wings, rooms, drawers, typed tunnels, KG facts, bitmap-indexed content, full audit trail."
license = "MIT OR Apache-2.0"
publish = false

[lib]
name = "locus_kit"
path = "src/lib.rs"

[features]
# test-seams exposes TEST-ONLY fault-injection hooks (e.g. the Estate
# `recall` internal-read fault seam) so out-of-crate integration tests —
# notably GeniusLocusKit/rust, which drives LocusKit recall through the
# RecallDirector — can trigger a real internal-read failure rather than
# only compile-verifying the degraded path. The seams are also active under
# `cfg(test)` for in-crate tests. Compiled out entirely in a normal build:
# zero production footprint.
test-seams = []

# Standalone crate. There is no top-level Cargo workspace in this
# repository; sibling kits (EngramLib/rust, VectorKit/rust, etc.) are
# each standalone crates. LP-1B added persistence-kit (schema declaration
# primitives) and uuid (estate_uuid parsing). LP-1C adds substrate-lib
# for the SimHash / HyperplaneFamily / Fingerprint256 primitives that
# `drawer_fingerprint` derives drawer fingerprints from.
[dependencies]
persistence-kit = { package = "persistence-kit", git = "https://github.com/codedaptive/moot-system", tag = "v1.0.14" }
substrate-lib = { package = "substrate-lib", git = "https://github.com/codedaptive/moot-core", tag = "v1.0.14" }
substrate-types = { package = "substrate-types", git = "https://github.com/codedaptive/moot-core", tag = "v1.0.14" }
substrate-kernel = { package = "substrate-kernel", git = "https://github.com/codedaptive/moot-core", tag = "v1.0.14" }
substrate-ml = { package = "substrate-ml", git = "https://github.com/codedaptive/moot-core", tag = "v1.0.14" }
uuid = { version = "1", features = ["v4"] }
# Ed25519 keypair generation for the federation signing identity minted at
# Authority: DECISION_SYNCKIT_DESIGN_2026-05-19 §8.
ed25519-dalek = { version = "2", features = ["rand_core"] }
rand_core = { version = "0.6", features = ["std"] }
# Base64 encoding for the Ed25519 key material persisted to the manifest.
base64 = "0.22"
# IntellectusLib is the zero-dep telemetry floor. LocusKit emits
# path, recall, and KG-fact operation metrics via the report! macro,
# which is a no-op when monitoring is disabled (the default).
# Authority: DECISION_LIFT_PACKAGE_SWIFT_RULE_2026-05-28 + MANAGER_1.0_PLAN §4.
intellectus-lib = { package = "intellectus-lib", git = "https://github.com/codedaptive/moot-core", tag = "v1.0.14" }
# LatticeLib supplies qid_closure::ancestors — the pinned Q-ID taxonomic-closure
# surface drawer_fingerprint hashes into the lattice-block qid_closure_hash slot
# DECISION_LIFT_PACKAGE_SWIFT_RULE_2026-05-28 (the #7 feature requires it).
lattice-lib = { package = "lattice-lib", git = "https://github.com/codedaptive/moot-semantics", tag = "v1.0.14" }
# unicode-normalization provides NFC normalization for lookup_name derivation
# (ADR-017 §8). Already a transitive dependency via the idna crate.
unicode-normalization = "0.1"

[dev-dependencies]
# JSON parsing for LP-0 conformance vectors. Only used in tests/lp0_vectors.rs.
serde_json = "1"
# rusqlite is used in corrupt_readback_tests.rs to corrupt stored values via
# raw SQL (bypassing the kit's codec). Identical test strategy to
# PersistenceKit/rust/tests/corrupt_readback_tests.rs. bundled = statically
# links the SQLite amalgamation, matching PersistenceKit's approach.
rusqlite = { version = "0.31", features = ["bundled"] }
